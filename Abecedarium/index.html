function buildUI() {
  const panel = document.getElementById('panel');

  // ── Colour (background only — font/fill/stroke are in the toolbar) ──
  const colourSec = makeSection('Colour');
  colourSec.bd.appendChild(makeColorRow('Background', () => P.bg, v => { P.bg = v; }));
  panel.appendChild(colourSec.hd);
  panel.appendChild(colourSec.bd);

  // ── Render ──
  const renderSec = makeSection('Render');
  renderSec.bd.appendChild(makeToggleRow(
    [{ label: 'Text', value: 'text' }, { label: 'Vector', value: 'vector' }],
    () => P.renderMode,
    v  => { P.renderMode = v; }
  ));
  renderSec.bd.appendChild(makeSingleToggle('Anchors', 'Anchors',
    () => P.showAnchors, v => { P.showAnchors = v; }
  ));
  renderSec.bd.appendChild(makeSingleToggle('Handles', 'Handles',
    () => P.showHandles, v => { P.showHandles = v; }
  ));

  // ── Render → Physically Motivated (stub) ──
  const physSub = makeSubSection('Physically Motivated', false);
  const physStub = document.createElement('div');
  physStub.className = 'subsec-stub';
  physStub.textContent = 'Coming soon: springs, coupled oscillators';
  physSub.bd.appendChild(physStub);
  renderSec.bd.appendChild(physSub.hd);
  renderSec.bd.appendChild(physSub.bd);

  // ── Render → Structural (stub) ──
  const strucSub = makeSubSection('Structural', false);
  const strucStub = document.createElement('div');
  strucStub.className = 'subsec-stub';
  strucStub.textContent = 'Coming soon: wave propagation, breathing';
  strucSub.bd.appendChild(strucStub);
  renderSec.bd.appendChild(strucSub.hd);
  renderSec.bd.appendChild(strucSub.bd);

  panel.appendChild(renderSec.hd);
  panel.appendChild(renderSec.bd);

  // ── Behaviour ──
  const behSec = makeSection('Behaviour');

  const danceSub = makeSubSection('Dance');

  // Embed the Dance on/off checkbox directly in the subsection header.
  // stopPropagation on click prevents the checkbox from also collapsing the accordion.
  _danceCb = document.createElement('input');
  _danceCb.type = 'checkbox'; _danceCb.id = 'cb-dance'; _danceCb.checked = danceActive;
  _danceCb.style.cssText = 'cursor:pointer; accent-color:#7af; margin-right:4px;';
  _danceCb.addEventListener('click', e => e.stopPropagation());
  danceSub.hd.insertBefore(_danceCb, danceSub.hd.firstChild);

  // Feature rows
  const featSpinRow      = makeFeatureRow('Spin',       'spin',      [
    { key: 'amt',  label: 'Amount', min: 0,    max: 0.3, step: 0.005 },
    { key: 'speed',label: 'Speed',  min: 0.01, max: 2,   step: 0.01  },
  ]);
  const featPulseRow     = makeFeatureRow('Pulse',      'pulse',     [
    { key: 'amt',  label: 'Amount', min: 0,    max: 0.3, step: 0.005 },
    { key: 'speed',label: 'Speed',  min: 0.01, max: 2,   step: 0.01  },
  ]);
  const featDriftRow     = makeFeatureRow('Drift',      'drift',     [
    { key: 'amt',  label: 'Amount', min: 0,    max: 50,  step: 0.5   },
    { key: 'speed',label: 'Speed',  min: 0.01, max: 2,   step: 0.01  },
  ]);
  const featPlantRow     = makeFeatureRow('Pin feet',   'pinFeet',   []);
  const featPinRow       = makeFeatureRow('Plant feet', 'plantFeet', [
    { key: 'thresh', label: 'Threshold', min: 0, max: 0.2, step: 0.005 },
  ]);
  const featRows = [featSpinRow, featPulseRow, featDriftRow, featPlantRow, featPinRow];
  featRows.forEach(r => danceSub.bd.appendChild(r));

  // Show/hide features and sync their state when Dance is toggled
  function syncFeatureRows() {
    // Sync each feature row's checkbox/slider state to the current glyph.
    // Visibility is controlled solely by the accordion — not by danceActive.
    featRows.forEach(r => r.sync());
  }
  _syncDanceFeatureRows = syncFeatureRows;  // expose for attachDance to call post-spawn
  _danceCb.addEventListener('change', () => {
    danceActive = _danceCb.checked;
    if (danceActive) { if (currentCG) attachDance(currentCG); }
    else             { if (currentCG) detachDance(currentCG); }

  behSec.bd.appendChild(danceSub.hd);
  behSec.bd.appendChild(danceSub.bd);

  // ── Behaviour → Noise ──
  const noiseSub = makeSubSection('Noise');

  // Embed Noise on/off checkbox in the subsection header (same pattern as Dance)

  _noiseCb.type = 'checkbox'; _noiseCb.id = 'cb-noise'; _noiseCb.checked = noiseActive;

    noiseActive = _noiseCb.checked;
    if (noiseActive) { if (currentCG) attachNoise(currentCG); }

  panel.appendChild(behSec.bd);

  actSec.bd.appendChild(makeActionBtn('Clear  (Esc / ⌫)', clearCG));

  const freezeBtn = makeActionBtn('Freeze', () => {
    P.frozen = !P.frozen;
    freezeBtn.textContent       = P.frozen ? 'Unfreeze' : 'Freeze';
    freezeBtn.style.color       = P.frozen ? '#7af' : '';
    freezeBtn.style.borderColor = P.frozen ? '#2a4060' : '';
  });
  actSec.bd.appendChild(freezeBtn);

  _autoRunBtn = makeActionBtn(
    _autoRunning ? 'Stop abcde…' : 'abcde…',
    () => { _autoRunning ? stopAutoRun() : startAutoRun(); }
  );
  if (_autoRunning) {
    _autoRunBtn.style.color       = '#f77';
    _autoRunBtn.style.borderColor = '#602020';
  }
  actSec.bd.appendChild(_autoRunBtn);

  // Dwell number entry + case toggle on one row
  const autoRow = document.createElement('div');
  autoRow.style.cssText = 'display:flex;align-items:center;gap:6px;margin:6px 0';

  const dwellLabel = document.createElement('span');
  dwellLabel.textContent = 'Dwell (s)';
  dwellLabel.style.cssText = 'font-size:10px;color:#888;flex:1';

  const dwellInput = document.createElement('input');
  dwellInput.type  = 'number';
  dwellInput.value = _autoDwell;
  dwellInput.min   = '1'; dwellInput.max = '60'; dwellInput.step = '1';
  dwellInput.className = 'param-val-input';
  dwellInput.style.width = '42px';
  dwellInput.addEventListener('change', () => {
    const v = parseFloat(dwellInput.value);
    if (v >= 1) _autoDwell = v;
  });

  const caseBtn = document.createElement('button');
  caseBtn.className   = 'tog-btn' + (_autoUppercase ? ' active' : '');
  caseBtn.textContent = _autoUppercase ? 'ABC' : 'abc';
  caseBtn.style.cssText = 'flex:0 0 auto;padding:3px 7px;font-size:10px;text-transform:none';
  caseBtn.addEventListener('click', () => {
    _autoUppercase      = !_autoUppercase;
    caseBtn.textContent = _autoUppercase ? 'ABC' : 'abc';
    caseBtn.classList.toggle('active', _autoUppercase);
  });

  autoRow.append(dwellLabel, dwellInput, caseBtn);
  actSec.bd.appendChild(autoRow);

  panel.appendChild(actSec.hd);
  panel.appendChild(actSec.bd);

  // ── File (bottom) ──
  const fileSec = makeSection('File', false);
  const fileRow = document.createElement('div');
  fileRow.style.cssText = 'display:flex;gap:4px';
  fileRow.appendChild(makeActionBtn('Save', saveStateToFile));
  fileRow.appendChild(makeActionBtn('Load', openStateFromFile));
  fileRow.appendChild(makeActionBtn('Print', printPNG));
  fileRow.querySelectorAll('button').forEach(b => b.style.flex = '1');
  fileSec.bd.appendChild(fileRow);

  // Video record row
  const recRow = document.createElement('div');
  recRow.style.cssText = 'display:flex;gap:4px;margin-top:4px;align-items:center';
  _recBtn = makeActionBtn('Record', toggleRecording);
  _recBtn.style.flex = '1';
  recRow.appendChild(_recBtn);

  const cursorCb = document.createElement('input');
  cursorCb.type = 'checkbox'; cursorCb.checked = _recCaptureCursor;
  cursorCb.style.cssText = 'cursor:pointer;accent-color:#7af;flex-shrink:0';
  cursorCb.addEventListener('change', () => { _recCaptureCursor = cursorCb.checked; });
  const cursorLbl = document.createElement('label');
  cursorLbl.textContent = 'cursor';
  cursorLbl.style.cssText = 'font-size:10px;color:#888;cursor:pointer';
  cursorLbl.addEventListener('click', () => { cursorCb.checked = !cursorCb.checked; _recCaptureCursor = cursorCb.checked; });
  recRow.append(cursorCb, cursorLbl);

  fileSec.bd.appendChild(recRow);
  panel.appendChild(fileSec.hd);
  panel.appendChild(fileSec.bd);

  // ── Char display + font status ──
  const disp = document.createElement('div');
  disp.id = 'char-display';
  panel.appendChild(disp);
  updateCharDisplay(null);

  const status = document.createElement('div');
  status.id = 'font-status';
  panel.appendChild(status);

  const saveStatus = document.createElement('div');
  saveStatus.id = 'save-status';
  panel.appendChild(saveStatus);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resizeCanvas();
  if (currentCG) {
    currentCG.x = currentCG.homeX = canvasCX();
    currentCG.y = currentCG.homeY = canvasCY();
  }
});

/// URL params: ?char=A auto-spawns that letter at 400pt with Dance active
const _urlChar = new URLSearchParams(window.location.search).get('char');
if (_urlChar) { P.size = 400; danceActive = true; }

resizeCanvas();
buildToolbar();
buildUI();
ensureFont(P.font);  // preload default font for vector mode
requestAnimationFrame(loop);

if (_urlChar) {
  spawnCG(_urlChar[0]);
  if (_danceCb) _danceCb.checked = true;
  if (_noiseCb) _noiseCb.checked = noiseActive;
}
</script>
</body>
</html>
