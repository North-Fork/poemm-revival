<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Abecedarium</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden;
             font-family: system-ui, -apple-system, sans-serif; }

/* ── Sidebar ── */
#panel {
  position: fixed; left: 0; top: 0; width: 240px; height: 100%;
  overflow-y: auto; background: #111; color: #ccc;
  font-size: 12px; padding: 10px; z-index: 10;
  border-right: 1px solid #222;
}

#panel-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
  color: #7af; margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid #1e1e1e;
}

.sec-hd {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
  padding: 10px 4px 4px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: #6b7280;
  border-top: 1px solid #1e1e1e; margin-top: 4px;
}
.sec-hd:hover { color: #9ca3af; }
.sec-arrow {
  display: inline-block; font-size: 8px; flex-shrink: 0;
  transition: transform 0.15s ease;
}
.sec-arrow.open { transform: rotate(90deg); }
.sec-bd.hidden  { display: none; }

/* Param rows */
.param-row    { margin: 6px 0; }
.param-header { display: flex; justify-content: space-between; align-items: baseline;
                margin-bottom: 2px; }
.param-name   { font-size: 10px; color: #888; }
/* number input replaces the old static .param-val span */
.param-val-input {
  width: 46px; background: transparent; color: #7af;
  border: none; border-bottom: 1px solid #2a2a2a;
  font-size: 10px; font-family: monospace; text-align: right;
  padding: 0 1px; -moz-appearance: textfield;
}
.param-val-input::-webkit-outer-spin-button,
.param-val-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.param-val-input:focus { outline: none; border-bottom-color: #7af; }

/* Select (dropdown) */
.sel-row { margin: 6px 0; display: flex; align-items: center; gap: 8px; }
.sel-row label { font-size: 10px; color: #888; flex: 1; }
.sel-row select {
  flex: 1.4; background: #181818; color: #ccc; border: 1px solid #2a2a2a;
  font-size: 11px; padding: 2px 4px; cursor: pointer;
}
.sel-row select:focus { outline: none; border-color: #336; }

/* Range */
input[type=range] {
  width: 100%; height: 12px; cursor: pointer; accent-color: #7af;
  -webkit-appearance: none; appearance: none; background: transparent;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 3px; background: #2a2a2a; border-radius: 2px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%;
  background: #7af; margin-top: -4px;
}

/* Color rows */
.color-row  { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.color-row label { font-size: 10px; color: #888; flex: 1; }
.color-row input[type=color] {
  width: 34px; height: 20px; padding: 1px 2px; cursor: pointer;
  border: 1px solid #2a2a2a; background: #111; border-radius: 3px;
}

/* Subsections (nested within a section) */
.subsec-hd {
  display: flex; align-items: center; gap: 5px;
  cursor: pointer; user-select: none;
  padding: 7px 4px 3px 6px;
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: #4b5563;
  border-top: 1px solid #1a1a1a; margin-top: 3px;
}
.subsec-hd:hover { color: #6b7280; }
.subsec-arrow {
  display: inline-block; font-size: 7px; flex-shrink: 0;
  transition: transform 0.15s ease;
}
.subsec-arrow.open { transform: rotate(90deg); }
.subsec-bd { padding-left: 6px; }
.subsec-bd.hidden { display: none; }
.subsec-stub { font-size: 10px; color: #333; padding: 4px 0 2px; font-style: italic; }

/* Behaviour rows: [checkbox] Label [──slider──] value */
.beh-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
.beh-row input[type=checkbox] { cursor: pointer; accent-color: #7af; flex-shrink: 0; }
.beh-row .beh-label { font-size: 10px; color: #888; cursor: pointer; flex-shrink: 0; width: 36px; }
.beh-row input[type=range] { flex: 1; width: auto; }
.beh-row .param-val-input { width: 36px; }

/* Feature rows (Dance sub-features) */
.feature-row { margin: 3px 0 3px 10px; }
.feature-hd { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 2px 0; }
.feature-hd input[type=checkbox] { cursor: pointer; accent-color: #7af; flex-shrink: 0; }
.feature-hd .feature-arrow { font-size: 8px; color: #666; flex-shrink: 0; transition: transform 0.1s; }
.feature-hd .feature-arrow.open { transform: rotate(90deg); }
.feature-hd .feature-label { font-size: 10px; color: #888; }
.feature-params { padding-left: 14px; }
.feature-params.hidden { display: none; }

/* Checkbox + color picker rows (Fill, Stroke) */
.check-color-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
.check-color-row input[type=checkbox] { cursor: pointer; accent-color: #7af; flex-shrink: 0; }
.check-color-row label { font-size: 10px; color: #888; flex: 1; cursor: pointer; }
.check-color-row input[type=color] {
  width: 28px; height: 18px; padding: 1px 2px; cursor: pointer;
  border: 1px solid #2a2a2a; background: #111; border-radius: 3px;
}

/* Toggle buttons (Render mode) */
.toggle-row { display: flex; gap: 6px; margin: 6px 0; }
.tog-btn {
  flex: 1; padding: 5px 0; background: #1a1a1a; color: #888;
  border: 1px solid #2a2a2a; cursor: pointer; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: background 0.1s, color 0.1s;
}
.tog-btn:hover  { background: #222; color: #aaa; }
.tog-btn.active { background: #1a2a3a; color: #7af; border-color: #2a4060; }

/* Action button */
.action-btn {
  width: 100%; padding: 7px; margin-top: 6px;
  background: #1a1a1a; color: #888; border: 1px solid #2a2a2a;
  cursor: pointer; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
}
.action-btn:hover  { background: #222; color: #aaa; }
.action-btn:active { background: #111; }

/* Current char readout */
#char-display {
  font-size: 10px; color: #555; margin-top: 14px; padding-top: 10px;
  border-top: 1px solid #1e1e1e; text-align: center; letter-spacing: 0.05em;
  line-height: 1.6;
}
#char-display .char-big {
  display: block; font-size: 32px; color: #444; margin: 4px 0;
  font-family: Georgia, serif;
}
#font-status {
  font-size: 9px; color: #444; text-align: center;
  margin-top: 4px; min-height: 14px;
  font-family: monospace;
}
#font-status.loading { color: #874; }
#font-status.ready   { color: #474; }
#font-status.failed  { color: #744; }
#save-status {
  font-size: 9px; text-align: center; margin-top: 6px;
  min-height: 14px; font-family: monospace; transition: opacity 0.4s;
}
#save-status.ok  { color: #474; }
#save-status.err { color: #744; }
#save-status.rec { color: #f77; }

/* Save modal */
#save-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
#save-modal {
  background: #1a1a1a; border: 1px solid #333; padding: 20px;
  width: 260px; display: flex; flex-direction: column; gap: 10px;
}
#save-modal label { color: #aaa; font-size: 11px; }
#save-modal input[type=text] {
  width: 100%; box-sizing: border-box;
  background: #0d0d0d; border: 1px solid #333; color: #ddd;
  font-size: 13px; padding: 5px 8px;
}
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button {
  padding: 4px 12px; font-size: 11px; cursor: pointer;
  border: 1px solid #333; background: #1a2a3a; color: #7af;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.modal-btns button.cancel { background: none; color: #666; border-color: #222; }
.modal-btns button:hover { background: #253545; color: #9cf; }

/* Toolbar */
#toolbar {
  position: fixed; left: 240px; top: 0; right: 0; height: 36px;
  background: #111; border-bottom: 1px solid #222; z-index: 9;
  display: flex; align-items: center; padding: 0 8px; gap: 0; overflow: hidden;
}
/* .tb-* styles injected by font-toolbar.js */

/* Canvas */
canvas { position: fixed; left: 240px; top: 36px; touch-action: none; display: block; }
/* Overlay canvas — anchors/handles only; pointer-events: none keeps clicks passing to #c */
#ov { pointer-events: none; z-index: 1; }
</style>
</head>
<body>

<div id="toolbar"><!-- built by buildToolbar() --></div>

<div id="panel">
  <div id="panel-title">Abecedarium</div>
  <!-- Sections built by buildUI() -->
</div>

<canvas id="c"></canvas>
<canvas id="ov"></canvas>

<!-- opentype.js for true bezier glyph paths + control points -->
<script src="https://unpkg.com/opentype.js@1.3.4/dist/opentype.min.js"></script>
<!-- Shared font/size/fill/stroke toolbar -->
<script src="font-toolbar.js"></script>
<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────
const FIXED_DT  = 1 / 60;
const EMPTY_DASH = [];   // shared ref — avoids [] allocation in setLineDash calls
const TAU        = Math.PI * 2;
let _uid = 0;
// Cached canvas CSS dimensions — updated in resizeCanvas(), read in loop()
let _canvasW = 0, _canvasH = 0;

// ── Parameters ───────────────────────────────────────────────────────────────
const P = {
  font:        'EB Garamond',
  size:        120,           // pt
  fillOn:      true,
  fillColor:   '#ffffff',
  strokeOn:    false,
  strokeColor: '#ffffff',
  strokeWidth: 1,
  bg:          '#000000',
  renderMode:  'vector',      // 'text' | 'vector'
  frozen:      false,         // pause noise evolution (global preview toggle)
  showAnchors: false,         // draw on-curve anchor points
  showHandles: false,         // draw off-curve control handles + lines
};

// ── Noise defaults ────────────────────────────────────────────────────────────
// Param key names match the old P fields so updateNoiseState/applyNoiseState need no changes.
const NOISE_DEFAULT = {
  independent: { enabled: false, params: { gaussAmt: 5, poissonAmt: 0, noiseSmooth: 0.7, noisePeriod: 0 } },
  perlin:      { enabled: false, params: { perlinAmt: 10, perlinFreq: 0.008, perlinSpeed: 0.15 } },
};

// ── Dance configs (per-letter body movement params) ───────────────────────────
// Dance feature configs: each feature has { enabled, params }.
// plantFeet.params.thresh: fraction of font size — baseline points within this Y-distance are noise-anchored.
const DANCE_DEFAULT = {
  spin:      { enabled: true,  params: { amt: 0.05,  speed: 0.2  } },
  pulse:     { enabled: true,  params: { amt: 0.05,  speed: 0.3  } },
  drift:     { enabled: true,  params: { amt: 10,    speed: 0.3  } },
  pinFeet: { enabled: false, params: {}                          },
  plantFeet:   { enabled: false, params: { thresh: 0.05 }            },
};

const DANCE = {
  'A': {
    spin:      { enabled: true,  params: { amt: 0.025, speed: 0.07  } },
    pulse:     { enabled: true,  params: { amt: 0.025, speed: 0.14  } },
    drift:     { enabled: false, params: { amt: 0,     speed: 0.08  } },
    pinFeet: { enabled: true,  params: {}                           },
    plantFeet:   { enabled: true,  params: { thresh: 0.05 }             },
  },
};

// ── Web fonts (loaded via opentype.js + CSS FontFace) ────────────────────────
const FONTS = [
  'EB Garamond', 'Playfair Display', 'Lora', 'Merriweather',
  'Libre Baskerville', 'Crimson Pro', 'Roboto', 'Open Sans',
  'Raleway', 'Josefin Sans', 'Source Code Pro', 'Courier Prime',
];

// woff files from jsDelivr/@fontsource v4 — opentype.js parses woff (zlib) reliably;
// woff2 uses Brotli and opentype.js's bundled decoder fails on it in practice.
const FONT_SOURCES = {
  'EB Garamond':       'https://cdn.jsdelivr.net/npm/@fontsource/eb-garamond@4/files/eb-garamond-latin-400-normal.woff',
  'Playfair Display':  'https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@4/files/playfair-display-latin-400-normal.woff',
  'Lora':              'https://cdn.jsdelivr.net/npm/@fontsource/lora@4/files/lora-latin-400-normal.woff',
  'Merriweather':      'https://cdn.jsdelivr.net/npm/@fontsource/merriweather@4/files/merriweather-latin-400-normal.woff',
  'Libre Baskerville': 'https://cdn.jsdelivr.net/npm/@fontsource/libre-baskerville@4/files/libre-baskerville-latin-400-normal.woff',
  'Crimson Pro':       'https://cdn.jsdelivr.net/npm/@fontsource/crimson-pro@4/files/crimson-pro-latin-400-normal.woff',
  'Roboto':            'https://cdn.jsdelivr.net/npm/@fontsource/roboto@4/files/roboto-latin-400-normal.woff',
  'Open Sans':         'https://cdn.jsdelivr.net/npm/@fontsource/open-sans@4/files/open-sans-latin-400-normal.woff',
  'Raleway':           'https://cdn.jsdelivr.net/npm/@fontsource/raleway@4/files/raleway-latin-400-normal.woff',
  'Josefin Sans':      'https://cdn.jsdelivr.net/npm/@fontsource/josefin-sans@4/files/josefin-sans-latin-400-normal.woff',
  'Source Code Pro':   'https://cdn.jsdelivr.net/npm/@fontsource/source-code-pro@4/files/source-code-pro-latin-400-normal.woff',
  'Courier Prime':     'https://cdn.jsdelivr.net/npm/@fontsource/courier-prime@4/files/courier-prime-latin-400-normal.woff',
};

// fontCache: name → opentype.Font | 'loading' | null (failed)
const fontCache = new Map();

async function ensureFont(name) {
  if (fontCache.has(name)) return;
  const url = FONT_SOURCES[name];
  if (!url) { fontCache.set(name, null); return; }

  fontCache.set(name, 'loading');
  setFontStatus('loading', name + '…');
  try {
    const buf    = await fetch(url).then(r => r.arrayBuffer());
    const otFont = opentype.parse(buf.slice(0));   // slice keeps buf intact for FontFace

    // Also register as CSS font so fillText renders it
    try {
      const face = new FontFace(name, buf);
      await face.load();
      document.fonts.add(face);
    } catch (_) { /* fillText will fall back to system font, vector still works */ }

    fontCache.set(name, otFont);
    if (name === P.font) setFontStatus('ready', name + ' ready');
    if (currentCG && currentCG.font === name && !currentCG._baseCmds) initCGPath(currentCG, otFont);
  } catch (e) {
    console.warn('Font load failed:', name, e);
    fontCache.set(name, null);
    if (name === P.font) setFontStatus('failed', 'failed: ' + e.message);
  }
}

let _saveStatusTimer = null;
function setSaveStatus(cls, msg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.className = cls; el.textContent = msg; el.style.opacity = '1';
  clearTimeout(_saveStatusTimer);
  _saveStatusTimer = setTimeout(() => { el.style.opacity = '0'; }, 6000);
}

function setFontStatus(cls, msg) {
  const el = document.getElementById('font-status');
  if (!el) return;
  el.className = cls;
  el.textContent = msg;
}

// ── RNG (FNV-1a seeded) ──────────────────────────────────────────────────────
function makeRNG(seed) {
  let h = 2166136261;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return function() {
    h ^= h << 13; h ^= h >>> 17; h ^= h << 5;
    h >>>= 0;
    return h / 4294967296;
  };
}

// ── ComplexGlyph factory ─────────────────────────────────────────────────────
function makeCG(char, x, y) {
  return {
    id:       'cg' + (_uid++),
    char,
    font:     P.font,
    size:     P.size,
    x, y,
    z:        0,
    homeX: x, homeY: y,
    rotation: 0,
    shear:    0,
    scale:    1,
    dynamics: {
      vx: 0, vy: 0,
      angularVel: 0,
      damping: 0.92,
    },
    material: {
      fill:      P.color,
      opacity:   1,
      blendMode: 'source-over',
    },
    geometry: {
      type: P.renderMode,
    },
    behaviours:   [],
    _state:       new Map(),
    mailbox:      [],
    stateMachine: null,
    rng:          makeRNG(char),
    _baseCmds:    null,   // editable path commands (null until font loads)
    _displayCmds: null,   // pre-allocated output buffer for noise-displaced rendering
    _noiseState:  null,   // per-point smoothed noise displacements
  };
}

// ── AgentEngine (scaffold — v1: phases 5 & 6 only) ──────────────────────────
const AgentEngine = (() => ({
  processFrame(dt, bCtx) {
    const cgs = bCtx.cgs;
    const nc  = cgs.length;
    for (let i = 0; i < nc; i++) {
      const cg = cgs[i];
      const beh = cg.behaviours;
      for (let j = 0; j < beh.length; j++) beh[j].type.apply(cg, dt, bCtx, beh[j].features);
    }
    for (let i = 0; i < nc; i++) {
      const cg  = cgs[i];
      const dyn = cg.dynamics;
      cg.x        += dyn.vx        * dt;
      cg.y        += dyn.vy        * dt;
      cg.rotation += dyn.angularVel * dt;
      dyn.vx        *= dyn.damping;
      dyn.vy        *= dyn.damping;
      dyn.angularVel *= dyn.damping;
    }
  },
  send()      {},
  broadcast() {},
  schedule()  {},
}))();

// ── Dance behaviour ───────────────────────────────────────────────────────────
const DanceBehavior = (() => {
  const sym = Symbol('dance');
  return {
    sym,
    apply(cg, dt, bCtx, features) {
      if (!features) return;
      const t  = bCtx.time;
      if (!cg._state.has(sym)) cg._state.set(sym, { baseScale: cg.scale });
      const st = cg._state.get(sym);
      const sp = features.spin;
      const pu = features.pulse;
      const dr = features.drift;
      const pf = features.pinFeet;

      // Spin amount (shared by rotation and shear modes)
      const spinVal = sp.enabled ? Math.sin(t * sp.params.speed * TAU) * sp.params.amt : 0;

      // Scale pulse
      cg.scale = pu.enabled
        ? st.baseScale * (1 + Math.sin(t * pu.params.speed * TAU) * pu.params.amt)
        : st.baseScale;

      // Body position — pinFeet (shear-bend) takes priority over drift
      if (pf.enabled && cg._footY != null) {
        // Shear-bend: foot row stays flat on the ground, stem bends above it.
        // cg.shear drives the canvas shear transform in drawCG.
        // cg.y is adjusted so the foot row stays at the same world Y under scale.
        cg.shear    = spinVal;
        cg.rotation = 0;
        cg.x = cg.homeX;
        cg.y = cg.homeY + cg._footY * (1 - cg.scale);
      } else {
        cg.shear    = 0;
        cg.rotation = spinVal;
        if (dr.enabled && dr.params.amt > 0) {
          // Drift — two incommensurate oscillators for organic 2-D wander
          cg.x = cg.homeX + Math.sin(t * dr.params.speed * TAU) * dr.params.amt;
          cg.y = cg.homeY + Math.sin(t * dr.params.speed * TAU * 1.618 + 1.0) * dr.params.amt * 0.7;
        }
      }
      // Zero dynamics so they don't fight body movement
      cg.dynamics.vx = 0;
      cg.dynamics.vy = 0;
      cg.dynamics.angularVel = 0;
    },
  };
})();

// ── Noise behaviour ───────────────────────────────────────────────────────────
const NoiseBehavior = {
  sym: Symbol('noise'),
  apply(cg, dt, bCtx, features) {
    if (!features || P.frozen) return;
    const ind = features.independent;
    if (ind.enabled && (ind.params.gaussAmt > 0 || ind.params.poissonAmt > 0)) {
      updateNoiseState(cg, dt, ind.params);
    }
    // Perlin is applied at render time (needs _renderTime) — nothing to do here
  },
};

function getNoiseBeh(cg) {
  return cg?.behaviours.find(b => b.type === NoiseBehavior) ?? null;
}

function attachNoise(cg) {
  if (!cg) return;
  if (!cg.behaviours.some(b => b.type === NoiseBehavior)) {
    // Restore saved features if available, otherwise use defaults
    const src = _savedNoiseFeatures ?? NOISE_DEFAULT;
    const features = {};
    for (const key of Object.keys(src))
      features[key] = { enabled: src[key].enabled, params: { ...src[key].params } };
    cg.behaviours.push({ type: NoiseBehavior, features });
  }
  // Note: callers are responsible for syncing the panel rows after features are fully set
}

function detachNoise(cg) {
  if (!cg) return;
  // Stash features so they survive re-enable
  const beh = getNoiseBeh(cg);
  if (beh) {
    _savedNoiseFeatures = {};
    for (const key of Object.keys(beh.features))
      _savedNoiseFeatures[key] = { enabled: beh.features[key].enabled, params: { ...beh.features[key].params } };
  }
  cg.behaviours = cg.behaviours.filter(b => b.type !== NoiseBehavior);
}

let danceActive          = false;
let _danceCb             = null;   // dance checkbox ref — set in buildUI, synced on URL-param load
let _syncDanceFeatureRows = () => {};  // set in buildUI; called after glyph spawns with dance active
let noiseActive           = false;
let _noiseCb              = null;      // noise checkbox ref — set in buildUI
let _syncNoiseFeatureRows = null;      // set in buildUI; called after glyph spawns
let _savedDanceFeatures   = null;      // persists across glyph spawns
let _savedNoiseFeatures   = null;      // persists across glyph spawns

// ── Alphabet auto-run ─────────────────────────────────────────────────────────
const AUTO_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let _autoRunning    = false;
let _autoIndex      = 0;
let _autoTimer      = null;
let _autoDwell      = 1;      // seconds per letter
let _autoUppercase  = true;   // true = A-Z, false = a-z
let _autoRunBtn     = null;   // button ref — set in buildUI
let _autoFeatures   = null;   // snapshot of dance features taken at run start; applied to every letter

// ── Video recording state ─────────────────────────────────────────────────────
let _mediaRecorder    = null;
let _recCaptureCursor = false;
let _cursorX          = -1;
let _cursorY          = -1;
let _mouseDown        = false;
let _recChunks      = [];
let _recStartTime   = 0;
let _recTimerHandle = null;
let _recBtn         = null;  // button ref — set in buildUI

// Returns the DanceBehavior entry from cg.behaviours, or null.
function getDanceBeh(cg) {
  return cg?.behaviours.find(b => b.type === DanceBehavior) ?? null;
}

function attachDance(cg) {
  if (!cg) return;
  if (!cg.behaviours.some(b => b.type === DanceBehavior)) {
    // Restore saved features if available, otherwise use per-letter config or default
    const src = _savedDanceFeatures ?? DANCE[cg.char.toUpperCase()] ?? DANCE_DEFAULT;
    const features = {};
    for (const key of Object.keys(src))
      features[key] = { enabled: src[key].enabled, params: { ...src[key].params } };
    cg.behaviours.push({ type: DanceBehavior, features });
    if (features.plantFeet?.enabled)
      _recomputeBaselineAnchored(cg, cg.size * features.plantFeet.params.thresh);
  }
  _syncDanceFeatureRows();
}

function detachDance(cg) {
  if (!cg) return;
  // Stash features so they survive re-enable
  const beh = getDanceBeh(cg);
  if (beh) {
    _savedDanceFeatures = {};
    for (const key of Object.keys(beh.features))
      _savedDanceFeatures[key] = { enabled: beh.features[key].enabled, params: { ...beh.features[key].params } };
  }
  const st = cg._state.get(DanceBehavior.sym);
  cg._state.delete(DanceBehavior.sym);
  cg.behaviours = cg.behaviours.filter(b => b.type !== DanceBehavior);
  cg.rotation = 0;
  cg.shear    = 0;
  cg.scale    = st ? st.baseScale : 1;
  cg.x = cg.homeX;
  cg.y = cg.homeY;
}

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const ov     = document.getElementById('ov');
const octx   = ov.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  _canvasW = window.innerWidth  - 240;
  _canvasH = window.innerHeight - 36;  // 36px toolbar at top
  canvas.width  = _canvasW * dpr;
  canvas.height = _canvasH * dpr;
  canvas.style.width  = _canvasW + 'px';
  canvas.style.height = _canvasH + 'px';
  ctx.scale(dpr, dpr);
  ov.width  = _canvasW * dpr;
  ov.height = _canvasH * dpr;
  ov.style.width  = _canvasW + 'px';
  ov.style.height = _canvasH + 'px';
  octx.scale(dpr, dpr);
}

// ── Perlin gradient noise (Ken Perlin's improved noise, 3D) ──────────────────
// Output range ≈ −1 … +1.  Use perlin3(bx*freq, by*freq, t*speed) for
// spatially-coherent outline displacement that animates smoothly over time.
let _renderTime  = 0;   // updated each render frame; read by applyNoiseState
let _frozenTime  = 0;   // clock value at the moment Freeze was pressed

const _PERM = (() => {
  const p = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,
    30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,
    219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,
    175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,
    230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,
    76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,
    186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,
    59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,
    70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,
    178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,
    241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,
    176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,
    128,195,78,66,215,61,156,180];
  const p2 = new Uint8Array(512);
  for (let i = 0; i < 512; i++) p2[i] = p[i & 255];
  return p2;
})();
function _fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function _grad3(h, x, y, z) {
  h &= 15;
  const u = h < 8 ? x : y;
  const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
  return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
}
function perlin3(x, y, z) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
  x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
  const u = _fade(x), v = _fade(y), w = _fade(z);
  const p = _PERM;
  const A = p[X]+Y, AA = p[A]+Z, AB = p[A+1]+Z, B = p[X+1]+Y, BA = p[B]+Z, BB = p[B+1]+Z;
  const lerp = (a, b, t) => a + t * (b - a);
  return lerp(
    lerp(lerp(_grad3(p[AA],  x,   y,   z),  _grad3(p[BA],  x-1, y,   z),  u),
         lerp(_grad3(p[AB],  x,   y-1, z),  _grad3(p[BB],  x-1, y-1, z),  u), v),
    lerp(lerp(_grad3(p[AA+1],x,   y,   z-1),_grad3(p[BA+1],x-1, y,   z-1),u),
         lerp(_grad3(p[AB+1],x,   y-1, z-1),_grad3(p[BB+1],x-1, y-1, z-1),u), v), w);
}

// ── Gaussian noise ────────────────────────────────────────────────────────────
// Box-Muller transform: uniform → standard normal
function gaussRand() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(TAU * v);
}

// Knuth algorithm; normal approximation for λ > 30 to avoid slow loops.
// Returns a centered Poisson sample (mean 0, variance λ) for use as displacement.
// Math.exp(-lambda) is cached since poissonAmt rarely changes between frames.
let _poissonLambda = -1, _poissonL = 1;
function poissonRand(lambda) {
  if (lambda <= 0) return 0;
  if (lambda > 30) {
    return Math.round(lambda + gaussRand() * Math.sqrt(lambda)) - lambda;
  }
  if (lambda !== _poissonLambda) { _poissonLambda = lambda; _poissonL = Math.exp(-lambda); }
  const L = _poissonL;
  let p = 1, k = 0;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1 - lambda;   // center so mean displacement = 0
}

// ── Stateful noise system ─────────────────────────────────────────────────────
// Each (x,y) pair in the path gets a slot: { cx, cy, tx, ty, timer }
//   cx/cy  = current smoothed displacement (what gets applied to rendering)
//   tx/ty  = target displacement (randomly generated)
//   timer  = countdown (seconds) until next target pick

function _noiseSlotCount(cmds) {
  let n = 0;
  for (const cmd of cmds) {
    if      (cmd.type === 'C') n += 3;
    else if (cmd.type === 'Q') n += 2;
    else if (cmd.type === 'M' || cmd.type === 'L') n += 1;
  }
  return n;
}

function initNoiseState(cg) {
  const n      = _noiseSlotCount(cg._baseCmds);
  // Period starts at 0 (noise default); re-staggered by updateNoiseState when period changes.
  cg._noiseSlots    = n;
  cg._cachedPeriod  = 0;
  cg._noiseState    = Array.from({ length: n }, () =>
    ({ cx: 0, cy: 0, tx: 0, ty: 0, timer: 0 }));
}

function _sampleDisp(pp) {
  return (pp.gaussAmt   > 0 ? gaussRand() * pp.gaussAmt  : 0) +
         (pp.poissonAmt > 0 ? poissonRand(pp.poissonAmt) : 0);
}

// Called each fixed physics tick. Advances timers, resamples targets, lerps.
// pp = NoiseBehavior independent feature params { gaussAmt, poissonAmt, noiseSmooth, noisePeriod }
function updateNoiseState(cg, dt, pp) {
  if (!cg._noiseState) initNoiseState(cg);

  const period = pp.noisePeriod > 0 ? pp.noisePeriod : 0;
  const ns     = cg._noiseState;
  const len    = ns.length;

  // Period changed → re-stagger all slot timers immediately.
  if (period !== cg._cachedPeriod) {
    cg._cachedPeriod = period;
    if (period > 0) {
      for (let i = 0; i < len; i++) ns[i].timer = Math.random() * period;
    }
  }

  const alpha  = 1 - Math.min(pp.noiseSmooth, 0.9999);
  const pinFt  = !!getDanceBeh(cg)?.features.plantFeet?.enabled;
  const ba     = cg._baselineAnchored;
  for (let i = 0; i < len; i++) {
    const s = ns[i];
    s.timer -= dt;
    if (s.timer <= 0) {
      s.tx    = _sampleDisp(pp);
      s.ty    = _sampleDisp(pp);
      s.timer = period;
    }
    // Suppress vertical noise for points pinned to the baseline.
    if (pinFt && ba && ba[i]) s.ty = 0;
    s.cx += (s.tx - s.cx) * alpha;
    s.cy += (s.ty - s.cy) * alpha;
  }
}

// Writes displaced coordinates into displayCmds in-place — no allocation.
// noiseState may be null when only Perlin noise is active.
// Perlin is sampled from base coordinates + _renderTime so it is spatially coherent.
// baselineAnchored: optional boolean[] (same indexing as noiseState slots).
// When provided, vertical displacement (Gaussian/Poisson + Perlin) is zeroed
// for anchored slots so those path points stay on the baseline.
function applyNoiseState(baseCmds, noiseState, displayCmds, baselineAnchored, perlinParams) {
  const perlinOn = !!perlinParams;
  const pa = perlinParams?.perlinAmt   ?? 0;
  const pf = perlinParams?.perlinFreq  ?? 0.008;
  const ps = perlinParams?.perlinSpeed ?? 0.15;
  const t  = _renderTime;
  let i = 0;
  for (let j = 0; j < baseCmds.length; j++) {
    const src = baseCmds[j], dst = displayCmds[j];
    switch (src.type) {
      case 'M': case 'L': {
        const gcx  = noiseState ? noiseState[i].cx : 0;
        const gcy  = noiseState ? noiseState[i].cy : 0;
        const anch = baselineAnchored && baselineAnchored[i];
        i++;
        const ppx = perlinOn ? perlin3(src.x * pf,        src.y * pf,        t * ps) * pa : 0;
        const ppy = (perlinOn && !anch) ? perlin3(src.x * pf + 47.3, src.y * pf + 91.7, t * ps) * pa : 0;
        dst.x = src.x + gcx + ppx;  dst.y = src.y + gcy + ppy;
        break;
      }
      case 'C': {
        const p1x = noiseState ? noiseState[i].cx : 0, p1y = noiseState ? noiseState[i].cy : 0;
        const a1  = baselineAnchored && baselineAnchored[i]; i++;
        const p2x = noiseState ? noiseState[i].cx : 0, p2y = noiseState ? noiseState[i].cy : 0;
        const a2  = baselineAnchored && baselineAnchored[i]; i++;
        const p3x = noiseState ? noiseState[i].cx : 0, p3y = noiseState ? noiseState[i].cy : 0;
        const a3  = baselineAnchored && baselineAnchored[i]; i++;
        const n1x = perlinOn ? perlin3(src.x1*pf,       src.y1*pf,       t*ps)*pa : 0;
        const n1y = (perlinOn && !a1) ? perlin3(src.x1*pf+47.3,  src.y1*pf+91.7,  t*ps)*pa : 0;
        const n2x = perlinOn ? perlin3(src.x2*pf,       src.y2*pf,       t*ps)*pa : 0;
        const n2y = (perlinOn && !a2) ? perlin3(src.x2*pf+47.3,  src.y2*pf+91.7,  t*ps)*pa : 0;
        const n3x = perlinOn ? perlin3(src.x *pf,       src.y *pf,       t*ps)*pa : 0;
        const n3y = (perlinOn && !a3) ? perlin3(src.x *pf+47.3,  src.y *pf+91.7,  t*ps)*pa : 0;
        dst.x1 = src.x1 + p1x + n1x;  dst.y1 = src.y1 + p1y + n1y;
        dst.x2 = src.x2 + p2x + n2x;  dst.y2 = src.y2 + p2y + n2y;
        dst.x  = src.x  + p3x + n3x;  dst.y  = src.y  + p3y + n3y;
        break;
      }
      case 'Q': {
        const q1x = noiseState ? noiseState[i].cx : 0, q1y = noiseState ? noiseState[i].cy : 0;
        const a1  = baselineAnchored && baselineAnchored[i]; i++;
        const q2x = noiseState ? noiseState[i].cx : 0, q2y = noiseState ? noiseState[i].cy : 0;
        const a2  = baselineAnchored && baselineAnchored[i]; i++;
        const n1x = perlinOn ? perlin3(src.x1*pf,       src.y1*pf,       t*ps)*pa : 0;
        const n1y = (perlinOn && !a1) ? perlin3(src.x1*pf+47.3,  src.y1*pf+91.7,  t*ps)*pa : 0;
        const n2x = perlinOn ? perlin3(src.x *pf,       src.y *pf,       t*ps)*pa : 0;
        const n2y = (perlinOn && !a2) ? perlin3(src.x *pf+47.3,  src.y *pf+91.7,  t*ps)*pa : 0;
        dst.x1 = src.x1 + q1x + n1x;  dst.y1 = src.y1 + q1y + n1y;
        dst.x  = src.x  + q2x + n2x;  dst.y  = src.y  + q2y + n2y;
        break;
      }
      // Z: no coordinates
    }
  }
}

// ── Baseline anchor map ───────────────────────────────────────────────────────
// Recomputes cg._baselineAnchored from cg._baseCmds and the given pixel threshold.
// thresh is in canvas pixels (= cg.size * plantFeetThresh fraction).
// Called from initCGPath (default thresh) and from the panel slider on change.
function _recomputeBaselineAnchored(cg, thresh) {
  if (!cg._baseCmds || cg._footY == null) { cg._baselineAnchored = null; return; }
  const fy = cg._footY;
  const ba = [];
  for (let j = 0; j < cg._baseCmds.length; j++) {
    const cmd = cg._baseCmds[j];
    if (cmd.type === 'M' || cmd.type === 'L') {
      ba.push(Math.abs(cmd.y - fy) < thresh);
    } else if (cmd.type === 'C') {
      ba.push(Math.abs(cmd.y1 - fy) < thresh);
      ba.push(Math.abs(cmd.y2 - fy) < thresh);
      ba.push(Math.abs(cmd.y  - fy) < thresh);
    } else if (cmd.type === 'Q') {
      ba.push(Math.abs(cmd.y1 - fy) < thresh);
      ba.push(Math.abs(cmd.y  - fy) < thresh);
    }
  }
  cg._baselineAnchored = ba;
}

// ── Base path init (stores editable commands on CG) ─────────────────────────
function initCGPath(cg, otFont) {
  const scale     = cg.size / otFont.unitsPerEm;
  const glyph     = otFont.charToGlyph(cg.char);
  const adv       = glyph.advanceWidth * scale;
  const startX    = -adv / 2;
  const baselineY = (otFont.ascender + otFont.descender) / 2 * scale;
  const path      = otFont.getPath(cg.char, startX, baselineY, cg.size);
  // Deep-copy so user edits don't affect the font object
  cg._baseCmds    = path.commands.map(cmd => ({ ...cmd }));
  // Pre-allocate output buffer (same structure) — updated in-place each frame
  cg._displayCmds = path.commands.map(cmd => ({ ...cmd }));
  cg._noiseState   = null;
  cg._noiseSlots   = null;   // cached slot count — set when noise state is inited
  cg._cachedPeriod = -1;     // force re-stagger on next init
  cg._fontStr      = `${cg.size}px "${cg.font}"`;  // cached ctx.font string
  cg._footY = baselineY;  // local Y of the glyph baseline (feet) — for pinFeet dance
  // Initial anchored map using default threshold; recomputed in attachDance (uses dance param).
  _recomputeBaselineAnchored(cg, cg.size * 0.05);
}

// ── Pointer → CG local coordinate transform ──────────────────────────────────
function canvasToCGLocal(mx, my, cg) {
  const dx  = mx - cg.x;
  const dy  = my - cg.y;
  const cos = Math.cos(-cg.rotation);
  const sin = Math.sin(-cg.rotation);
  return {
    x: (dx * cos - dy * sin) / cg.scale,
    y: (dx * sin + dy * cos) / cg.scale,
  };
}

// Returns { cmdIdx, role } of the nearest selectable point within radius, or null.
function hitTestPoints(lx, ly, cmds, radius) {
  let best = null, bestDist = radius;
  function check(cmdIdx, role, x, y) {
    const d = Math.hypot(x - lx, y - ly);
    if (d < bestDist) { bestDist = d; best = { cmdIdx, role }; }
  }
  for (let i = 0; i < cmds.length; i++) {
    const cmd = cmds[i];
    if (cmd.type === 'M' || cmd.type === 'L') {
      check(i, 'anchor', cmd.x, cmd.y);
    } else if (cmd.type === 'C') {
      check(i, 'cp1', cmd.x1, cmd.y1);
      check(i, 'cp2', cmd.x2, cmd.y2);
      check(i, 'anchor', cmd.x, cmd.y);
    } else if (cmd.type === 'Q') {
      check(i, 'cp1', cmd.x1, cmd.y1);
      check(i, 'anchor', cmd.x, cmd.y);
    }
  }
  return best;
}

// ── Control-point visualization (batched — O(1) draw calls) ─────────────────
// All handle lines → 1 stroke
// All non-selected anchors → 1 fill
// Selected anchor (0 or 1) → 1 fill + 1 stroke
// All non-selected handles → 1 stroke
// Selected handle (0 or 1) → 1 stroke

function drawControlPoints(xctx, commands, sel) {
  const selIdx  = sel ? sel.cmdIdx : -1;
  const selRole = sel ? sel.role   : '';
  const n = commands.length;

  // Batch 1: handle lines
  if (P.showHandles) {
    let px = 0, py = 0, fx = 0, fy = 0;
    xctx.beginPath();
    for (let i = 0; i < n; i++) {
      const cmd = commands[i];
      if (cmd.type === 'M') {
        px = fx = cmd.x; py = fy = cmd.y;
      } else if (cmd.type === 'L') {
        px = cmd.x; py = cmd.y;
      } else if (cmd.type === 'C') {
        xctx.moveTo(px, py);       xctx.lineTo(cmd.x1, cmd.y1);
        xctx.moveTo(cmd.x, cmd.y); xctx.lineTo(cmd.x2, cmd.y2);
        px = cmd.x; py = cmd.y;
      } else if (cmd.type === 'Q') {
        xctx.moveTo(px, py);       xctx.lineTo(cmd.x1, cmd.y1);
        xctx.moveTo(cmd.x, cmd.y); xctx.lineTo(cmd.x1, cmd.y1);
        px = cmd.x; py = cmd.y;
      } else if (cmd.type === 'Z') {
        px = fx; py = fy;
      }
    }
    xctx.strokeStyle = 'rgba(250,170,70,0.4)';
    xctx.lineWidth = 0.75;
    xctx.setLineDash(EMPTY_DASH);
    xctx.stroke();
  }

  // Batch 2: non-selected anchors (one fill pass)
  if (P.showAnchors) {
    xctx.beginPath();
    for (let i = 0; i < n; i++) {
      const cmd = commands[i];
      if ((cmd.type === 'M' || cmd.type === 'L' || cmd.type === 'C' || cmd.type === 'Q') &&
          !(i === selIdx && selRole === 'anchor')) {
        xctx.moveTo(cmd.x + 4, cmd.y);
        xctx.arc(cmd.x, cmd.y, 4, 0, TAU);
      }
    }
    xctx.fillStyle = '#7af';
    xctx.fill();

    // Selected anchor (at most 1)
    if (selIdx >= 0 && selRole === 'anchor' && selIdx < n) {
      const cmd = commands[selIdx];
      xctx.beginPath();
      xctx.arc(cmd.x, cmd.y, 6, 0, TAU);
      xctx.fillStyle = '#bdf';
      xctx.fill();
      xctx.strokeStyle = '#fff';
      xctx.lineWidth = 1;
      xctx.stroke();
    }
  }

  // Batch 3: non-selected handle circles (one stroke pass)
  if (P.showHandles) {
    xctx.beginPath();
    for (let i = 0; i < n; i++) {
      const cmd = commands[i];
      if (cmd.type === 'C') {
        if (!(i === selIdx && selRole === 'cp1')) {
          xctx.moveTo(cmd.x1 + 3, cmd.y1);
          xctx.arc(cmd.x1, cmd.y1, 3, 0, TAU);
        }
        if (!(i === selIdx && selRole === 'cp2')) {
          xctx.moveTo(cmd.x2 + 3, cmd.y2);
          xctx.arc(cmd.x2, cmd.y2, 3, 0, TAU);
        }
      } else if (cmd.type === 'Q') {
        if (!(i === selIdx && selRole === 'cp1')) {
          xctx.moveTo(cmd.x1 + 3, cmd.y1);
          xctx.arc(cmd.x1, cmd.y1, 3, 0, TAU);
        }
      }
    }
    xctx.strokeStyle = '#fa7';
    xctx.lineWidth = 1.5;
    xctx.setLineDash(EMPTY_DASH);
    xctx.stroke();

    // Selected handle (at most 1)
    if (selIdx >= 0 && (selRole === 'cp1' || selRole === 'cp2') && selIdx < n) {
      const cmd = commands[selIdx];
      const hx = selRole === 'cp1' ? cmd.x1 : cmd.x2;
      const hy = selRole === 'cp1' ? cmd.y1 : cmd.y2;
      xctx.beginPath();
      xctx.arc(hx, hy, 5, 0, TAU);
      xctx.strokeStyle = '#fdb';
      xctx.lineWidth = 2;
      xctx.stroke();
    }
  }
}

// ── drawCG ───────────────────────────────────────────────────────────────────
// dc: drawing context — omit (or pass null) for normal render (uses ctx + octx overlay).
//     Pass an offscreen context for export (no overlay, no animation state mutation).
function drawCG(cg, dc) {
  const isExport = !!dc;
  if (!dc) dc = ctx;

  dc.save();
  if (!isExport) octx.save();
  dc.translate(cg.x, cg.y);
  if (!isExport) octx.translate(cg.x, cg.y);
  if (cg.shear !== 0 && cg._footY != null) {
    // Planted-feet shear: foot row stays fixed, stem bends above it.
    dc.scale(cg.scale, cg.scale);
    if (!isExport) octx.scale(cg.scale, cg.scale);
    const k = cg.shear, fy = cg._footY;
    dc.transform(1, 0, -k, 1, k * fy, 0);
    if (!isExport) octx.transform(1, 0, -k, 1, k * fy, 0);
  } else {
    dc.rotate(cg.rotation);
    if (!isExport) octx.rotate(cg.rotation);
    dc.scale(cg.scale, cg.scale);
    if (!isExport) octx.scale(cg.scale, cg.scale);
  }
  dc.globalAlpha = cg.material.opacity;
  dc.globalCompositeOperation = cg.material.blendMode;

  const otFont = fontCache.get(cg.font);
  const fontReady = otFont && otFont !== 'loading';

  if (cg.geometry.type === 'vector' && fontReady) {
    // ── opentype vector outline + bezier control points ──
    if (!cg._baseCmds) initCGPath(cg, otFont);
    const baseCmds = cg._baseCmds;

    const nf           = getNoiseBeh(cg)?.features;
    const indActive    = nf?.independent.enabled &&
      (nf.independent.params.gaussAmt > 0 || nf.independent.params.poissonAmt > 0);
    const perlinActive = nf?.perlin.enabled && nf.perlin.params.perlinAmt > 0 && !P.frozen;
    const noiseActive  = indActive || perlinActive;
    if (noiseActive && cg._displayCmds) {
      const pinFt = !!getDanceBeh(cg)?.features.plantFeet?.enabled;
      applyNoiseState(
        baseCmds, cg._noiseState, cg._displayCmds,
        pinFt ? cg._baselineAnchored : null,
        perlinActive ? nf.perlin.params : null
      );
    }
    const cmds = (noiseActive && cg._displayCmds) ? cg._displayCmds : baseCmds;

    dc.beginPath();
    for (let ci = 0; ci < cmds.length; ci++) {
      const cmd = cmds[ci];
      switch (cmd.type) {
        case 'M': dc.moveTo(cmd.x, cmd.y); break;
        case 'L': dc.lineTo(cmd.x, cmd.y); break;
        case 'C': dc.bezierCurveTo(cmd.x1, cmd.y1, cmd.x2, cmd.y2, cmd.x, cmd.y); break;
        case 'Q': dc.quadraticCurveTo(cmd.x1, cmd.y1, cmd.x, cmd.y); break;
        case 'Z': dc.closePath(); break;
      }
    }
    if (P.fillOn) {
      dc.fillStyle = P.fillColor;
      dc.fill();
    }
    if (P.strokeOn) {
      dc.strokeStyle = P.strokeColor;
      dc.lineWidth   = P.strokeWidth;
      dc.lineJoin    = 'round';
      dc.stroke();
    }

    // Control points go on overlay only (not in exports/recordings)
    if (!isExport) drawControlPoints(octx, baseCmds, sel);

  } else if (cg.geometry.type === 'text') {
    // ── filled/stroked text ──
    if (!cg._fontStr) cg._fontStr = `${cg.size}px "${cg.font}"`;
    dc.font         = cg._fontStr;
    dc.textAlign    = 'center';
    dc.textBaseline = 'middle';
    if (P.strokeOn) {
      dc.strokeStyle = P.strokeColor;
      dc.lineWidth   = P.strokeWidth;
      dc.lineJoin    = 'round';
      dc.strokeText(cg.char, 0, 0);
    }
    if (P.fillOn) {
      dc.fillStyle = P.fillColor;
      dc.fillText(cg.char, 0, 0);
    }

  } else {
    // ── vector fallback (font still loading) ──
    if (!cg._fontStr) cg._fontStr = `${cg.size}px "${cg.font}"`;
    dc.font         = cg._fontStr;
    dc.textAlign    = 'center';
    dc.textBaseline = 'middle';
    if (P.strokeOn) {
      dc.strokeStyle = P.strokeColor;
      dc.lineWidth   = P.strokeWidth;
      dc.lineJoin    = 'round';
      dc.strokeText(cg.char, 0, 0);
    }
    if (P.fillOn) {
      dc.fillStyle = P.fillColor;
      dc.fillText(cg.char, 0, 0);
    }
  }

  dc.restore();
  if (!isExport) octx.restore();
}

// ── App state ────────────────────────────────────────────────────────────────
let currentCG = null;
let _lastTs   = null;
let _accum    = 0;

// Pre-allocated per-frame context — never recreated to avoid GC pressure
const _cgsList = [];
const _bCtx    = { cgs: _cgsList, time: 0, engine: AgentEngine };

// Selection / drag state
let sel      = null;   // { cmdIdx, role } — selected point
let drag     = null;   // { cmdIdx, role, lastLX, lastLY } — active control-point drag
let bodyDrag = null;   // { lastMX, lastMY } — active glyph-body drag

function canvasCX() { return (window.innerWidth  - 240) / 2; }
function canvasCY() { return (window.innerHeight - 36)   / 2; }

function _snapshotFeatures(beh) {
  if (!beh) return null;
  const snap = {};
  for (const key of Object.keys(beh.features))
    snap[key] = { enabled: beh.features[key].enabled, params: { ...beh.features[key].params } };
  return snap;
}

function spawnCG(char) {
  // Snapshot live behaviour state so the new glyph inherits it
  if (currentCG) {
    _savedDanceFeatures = _snapshotFeatures(getDanceBeh(currentCG)) ?? _savedDanceFeatures;
    _savedNoiseFeatures = _snapshotFeatures(getNoiseBeh(currentCG)) ?? _savedNoiseFeatures;
  }
  sel = null; drag = null; bodyDrag = null;
  currentCG = makeCG(char, canvasCX(), canvasCY());
  const otFont = fontCache.get(P.font);
  if (otFont && otFont !== 'loading') initCGPath(currentCG, otFont);
  else ensureFont(P.font);
  updateCharDisplay(char);
  if (danceActive) attachDance(currentCG);
  if (noiseActive) { attachNoise(currentCG); _syncNoiseFeatureRows?.(); }
}

function clearCG() {
  sel = null; drag = null; bodyDrag = null;
  currentCG = null;
  updateCharDisplay(null);
}

// Keep live CG in sync with P when params change
function syncCGtoP() {
  if (!currentCG) return;
  // Font or size change → discard edits and reinit path
  if (currentCG.font !== P.font || currentCG.size !== P.size) {
    currentCG._baseCmds          = null;
    currentCG._displayCmds       = null;
    currentCG._noiseState        = null;
    currentCG._noiseSlots        = null;
    currentCG._cachedPeriod      = -1;
    currentCG._fontStr           = null;
    currentCG._baselineAnchored  = null;
    sel = null;
  }
  currentCG.font          = P.font;
  currentCG.size          = P.size;
  currentCG.material.fill = P.fillColor;
  currentCG.geometry.type = P.renderMode;
}

// ── Render loop (fixed timestep) ─────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);

  if (_lastTs === null) { _lastTs = ts; }
  const elapsed = Math.min((ts - _lastTs) / 1000, 0.1);
  _lastTs = ts;

  _cgsList.length = 0;
  if (currentCG) _cgsList.push(currentCG);

  if (P.frozen) {
    // Hold clock still — behaviours tick against the frozen time value
    _bCtx.time  = _frozenTime;
    _renderTime = _frozenTime;
  } else {
    _accum += elapsed;
    _frozenTime = ts / 1000;   // keep updated so unfreeze resumes smoothly
    _bCtx.time  = _frozenTime;
    _renderTime = _frozenTime;
  }

  if (!P.frozen) {
    while (_accum >= FIXED_DT) {
      AgentEngine.processFrame(FIXED_DT, _bCtx);  // NoiseBehavior.apply handles updateNoiseState
      // Keep glyph pinned while user is dragging — stops DanceBehavior drift fighting the drag
      if (bodyDrag && currentCG) {
        currentCG.dynamics.vx = 0;
        currentCG.dynamics.vy = 0;
      }
      _accum -= FIXED_DT;
    }
  }

  ctx.fillStyle = P.bg;
  ctx.fillRect(0, 0, _canvasW, _canvasH);
  octx.clearRect(0, 0, _canvasW, _canvasH);
  if (currentCG) drawCG(currentCG);
  if (_recCaptureCursor && _mouseDown && _cursorX >= 0) {
    ctx.save();
    ctx.font         = '24px serif';
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'top';
    ctx.shadowColor  = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur   = 4;
    ctx.fillText('✊', _cursorX - 12, _cursorY - 20);
    ctx.restore();
  }
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  if (e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Escape') {
    clearCG(); return;
  }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) { stopAutoRun(); spawnCG(e.key); }
});

// ── Control-point + body interaction ─────────────────────────────────────────
const HIT_RADIUS = 12;   // px in canvas CSS coords

function getCanvasXY(e) {
  const r = canvas.getBoundingClientRect();
  return { mx: e.clientX - r.left, my: e.clientY - r.top };
}

function bodyHitRadius(cg) { return cg.size * cg.scale * 0.55; }

canvas.addEventListener('pointerdown', (e) => {
  if (!currentCG) return;
  const { mx, my } = getCanvasXY(e);

  // Control-point drag takes priority (vector mode only)
  if (currentCG._baseCmds && currentCG.geometry.type === 'vector') {
    const local = canvasToCGLocal(mx, my, currentCG);
    const hit   = hitTestPoints(local.x, local.y, currentCG._baseCmds, HIT_RADIUS / currentCG.scale);
    if (hit) {
      sel  = hit;
      drag = { ...hit, lastLX: local.x, lastLY: local.y };
      canvas.setPointerCapture(e.pointerId);
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
      return;
    } else {
      sel = null;
    }
  }

  // Body drag — works in both text and vector modes
  // During auto-run, any click (that didn't hit a control point) grabs the glyph.
  const bdx = mx - currentCG.x, bdy = my - currentCG.y;
  if (_autoRunning || Math.sqrt(bdx * bdx + bdy * bdy) < bodyHitRadius(currentCG)) {
    bodyDrag = { lastMX: mx, lastMY: my };
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

document.addEventListener('pointermove',  (e) => { _cursorX = e.clientX - 240; _cursorY = e.clientY; });
document.addEventListener('pointerdown',  ()  => { _mouseDown = true; });
document.addEventListener('pointerup',    ()  => { _mouseDown = false; });
document.addEventListener('pointercancel',()  => { _mouseDown = false; });

canvas.addEventListener('pointermove', (e) => {
  if (!currentCG) return;
  const { mx, my } = getCanvasXY(e);

  if (drag) {
    // Move the dragged control-point coordinate in _baseCmds
    const local = canvasToCGLocal(mx, my, currentCG);
    const dx  = local.x - drag.lastLX;
    const dy  = local.y - drag.lastLY;
    const cmd = currentCG._baseCmds[drag.cmdIdx];
    if (drag.role === 'anchor')     { cmd.x  += dx; cmd.y  += dy; }
    else if (drag.role === 'cp1')   { cmd.x1 += dx; cmd.y1 += dy; }
    else if (drag.role === 'cp2')   { cmd.x2 += dx; cmd.y2 += dy; }
    drag.lastLX = local.x;
    drag.lastLY = local.y;
    e.preventDefault();

  } else if (bodyDrag) {
    // Reposition the glyph
    const dx = mx - bodyDrag.lastMX;
    const dy = my - bodyDrag.lastMY;
    currentCG.x     += dx;
    currentCG.y     += dy;
    currentCG.homeX += dx;
    currentCG.homeY += dy;
    currentCG.dynamics.vx = 0;
    currentCG.dynamics.vy = 0;
    bodyDrag.lastMX = mx;
    bodyDrag.lastMY = my;
    e.preventDefault();

  } else {
    // Hover cursor
    if (currentCG._baseCmds && currentCG.geometry.type === 'vector') {
      const local = canvasToCGLocal(mx, my, currentCG);
      const hit = hitTestPoints(local.x, local.y, currentCG._baseCmds, HIT_RADIUS / currentCG.scale);
      canvas.style.cursor = hit ? 'pointer' : 'default';
    } else {
      const bdx = mx - currentCG.x, bdy = my - currentCG.y;
      canvas.style.cursor = Math.sqrt(bdx * bdx + bdy * bdy) < bodyHitRadius(currentCG)
        ? 'grab' : 'default';
    }
  }
});

canvas.addEventListener('pointerup', (e) => {
  drag     = null;
  bodyDrag = null;
  canvas.style.cursor = 'default';
});

// ── UI helpers ────────────────────────────────────────────────────────────────
// Tracks which sections/subsections the user has explicitly opened or closed.
// Keys are titles. Values: true = open, false = closed. Absent = use default.
const _secState = new Map();

function makeSection(title, startOpen = true) {
  const isOpen = _secState.has(title) ? _secState.get(title) : startOpen;
  const hd = document.createElement('div');
  hd.className = 'sec-hd';
  const arrow = document.createElement('span');
  arrow.className = 'sec-arrow' + (isOpen ? ' open' : '');
  arrow.textContent = '▶';
  hd.appendChild(arrow);
  hd.appendChild(document.createTextNode(title));
  const bd = document.createElement('div');
  bd.className = 'sec-bd';
  if (!isOpen) bd.classList.add('hidden');
  hd.addEventListener('click', () => {
    arrow.classList.toggle('open');
    bd.classList.toggle('hidden');
    _secState.set(title, arrow.classList.contains('open'));
  });
  return { hd, bd };
}

function makeSubSection(title, startOpen = true) {
  const isOpen = _secState.has(title) ? _secState.get(title) : startOpen;
  const hd = document.createElement('div');
  hd.className = 'subsec-hd';
  const arrow = document.createElement('span');
  arrow.className = 'subsec-arrow' + (isOpen ? ' open' : '');
  arrow.textContent = '▶';
  hd.appendChild(arrow);
  hd.appendChild(document.createTextNode(title));
  const bd = document.createElement('div');
  bd.className = 'subsec-bd';
  if (!isOpen) bd.classList.add('hidden');
  hd.addEventListener('click', () => {
    arrow.classList.toggle('open');
    bd.classList.toggle('hidden');
    _secState.set(title, arrow.classList.contains('open'));
  });
  return { hd, bd };
}

// Single row: [checkbox] Label [──slider──] value
// Returns { row, cb } — cb is the checkbox element for external sync.
function makeBehRow(label, cbId, checkedGetter, checkedSetter, min, max, step, sliderGetter, sliderSetter) {
  const fmt = v => v.toFixed(step < 0.01 ? 3 : step < 0.1 ? 2 : 1);
  const row = document.createElement('div');
  row.className = 'beh-row';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.id = cbId; cb.checked = checkedGetter();
  const lbl = document.createElement('label');
  lbl.htmlFor = cbId; lbl.className = 'beh-label'; lbl.textContent = label;
  const range = document.createElement('input');
  range.type = 'range'; range.min = min; range.max = max; range.step = step;
  range.value = sliderGetter();
  const num = document.createElement('input');
  num.type = 'number'; num.className = 'param-val-input';
  num.value = fmt(sliderGetter()); num.min = min; num.max = max; num.step = step;
  cb.addEventListener('change', () => checkedSetter(cb.checked));
  range.addEventListener('input', () => {
    const v = parseFloat(range.value); sliderSetter(v); num.value = fmt(v);
  });
  num.addEventListener('change', () => {
    const v = Math.min(max, Math.max(min, parseFloat(num.value) || 0));
    range.value = v; sliderSetter(v); num.value = fmt(v);
  });
  row.appendChild(cb); row.appendChild(lbl); row.appendChild(range); row.appendChild(num);
  return { row, cb };
}

function makeSlider(label, min, max, step, getter, setter) {
  const fmt = v => Number.isInteger(step) ? String(Math.round(v)) : v.toFixed(2);

  const row = document.createElement('div');
  row.className = 'param-row';

  const hdr = document.createElement('div');
  hdr.className = 'param-header';

  const lbl = document.createElement('span');
  lbl.className = 'param-name';
  lbl.textContent = label;

  // Editable number input (replaces static span)
  const numInp = document.createElement('input');
  numInp.type = 'number'; numInp.className = 'param-val-input';
  numInp.min = min; numInp.max = max; numInp.step = step;
  numInp.value = fmt(getter());

  hdr.appendChild(lbl);
  hdr.appendChild(numInp);

  const rangeInp = document.createElement('input');
  rangeInp.type = 'range'; rangeInp.min = min; rangeInp.max = max; rangeInp.step = step;
  rangeInp.value = getter();

  // Range → number + P (live)
  rangeInp.addEventListener('input', () => {
    const v = parseFloat(rangeInp.value);
    numInp.value = fmt(v);
    setter(v);
    if (currentCG) syncCGtoP();
  });

  // Number → range + P (on commit: Enter or blur)
  function commitNum() {
    let v = parseFloat(numInp.value);
    if (isNaN(v)) v = getter();
    v = Math.max(min, Math.min(max, Math.round(v / step) * step));
    numInp.value = fmt(v);
    rangeInp.value = v;
    setter(v);
    if (currentCG) syncCGtoP();
  }
  numInp.addEventListener('change', commitNum);
  numInp.addEventListener('keydown', e => { if (e.key === 'Enter') numInp.blur(); });

  row.appendChild(hdr);
  row.appendChild(rangeInp);
  return row;
}

// Builds a feature row: checkbox toggle + optional param sliders (shown when enabled).
// paramDefs: array of { key, label, min, max, step }
// Builds a feature row: independent checkbox (enable/disable) + accordion (show/hide params).
// Reads/writes to getDanceBeh(currentCG).features[featureKey].
function makeFeatureRow(label, featureKey, paramDefs) {
  const wrap = document.createElement('div');
  wrap.className = 'feature-row';

  // Header: [☐] [▶] Label — checkbox and accordion are independent
  const hd = document.createElement('div');
  hd.className = 'feature-hd';

  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.id = `cb-feat-${featureKey}`;
  cb.addEventListener('click', e => e.stopPropagation()); // don't collapse accordion on checkbox click

  const lbl = document.createElement('span');
  lbl.className = 'feature-label'; lbl.textContent = label;
  lbl.addEventListener('click', () => cb.click()); // clicking label toggles checkbox only

  hd.append(cb);

  // Param sliders — only add accordion arrow if there are params
  const paramsDiv = document.createElement('div');
  paramsDiv.className = 'feature-params';

  if (paramDefs.length > 0) {
    const arrow = document.createElement('span');
    arrow.className = 'feature-arrow open';
    arrow.textContent = '▶';
    hd.append(arrow, lbl);

    for (const pd of paramDefs) {
      paramsDiv.appendChild(makeSlider(pd.label, pd.min, pd.max, pd.step,
        () => getDanceBeh(currentCG)?.features[featureKey]?.params[pd.key] ?? pd.min,
        v  => {
          const beh = getDanceBeh(currentCG);
          if (beh?.features[featureKey]) beh.features[featureKey].params[pd.key] = v;
        }
      ));
    }

    // Clicking the header (not the checkbox or label) toggles the accordion
    hd.addEventListener('click', () => {
      arrow.classList.toggle('open');
      paramsDiv.classList.toggle('hidden');
    });
  } else {
    hd.append(lbl); // no arrow for param-less features
  }

  wrap.appendChild(hd);
  wrap.appendChild(paramsDiv);

  cb.addEventListener('change', () => {
    // Auto-enable Dance if a feature is turned on while Dance is off
    if (cb.checked && !getDanceBeh(currentCG)) {
      danceActive = true;
      if (_danceCb) _danceCb.checked = true;
      if (currentCG) attachDance(currentCG);
    }
    const beh = getDanceBeh(currentCG);
    if (!beh?.features[featureKey]) return;
    beh.features[featureKey].enabled = cb.checked;
    // Side effect: recompute baseline anchor map when plantFeet is toggled on
    if (featureKey === 'plantFeet' && cb.checked && currentCG)
      _recomputeBaselineAnchored(currentCG, currentCG.size * (beh.features.plantFeet.params.thresh ?? 0.05));
  });

  // sync() updates the checkbox state only — accordion visibility is user-controlled
  function sync() {
    cb.checked = !!getDanceBeh(currentCG)?.features[featureKey]?.enabled;
  }
  sync();

  wrap.sync = sync;
  return wrap;
}

// Like makeFeatureRow but reads/writes NoiseBehavior features instead of DanceBehavior.
function makeNoiseFeatureRow(label, featureKey, paramDefs) {
  const wrap = document.createElement('div');
  wrap.className = 'feature-row';

  const hd = document.createElement('div');
  hd.className = 'feature-hd';

  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.id = `cb-noise-${featureKey}`;
  cb.addEventListener('click', e => e.stopPropagation());

  const lbl = document.createElement('span');
  lbl.className = 'feature-label'; lbl.textContent = label;
  lbl.addEventListener('click', () => cb.click());

  hd.append(cb);

  const paramsDiv = document.createElement('div');
  paramsDiv.className = 'feature-params';

  if (paramDefs.length > 0) {
    const arrow = document.createElement('span');
    arrow.className = 'feature-arrow open';
    arrow.textContent = '▶';
    hd.append(arrow, lbl);

    for (const pd of paramDefs) {
      paramsDiv.appendChild(makeSlider(pd.label, pd.min, pd.max, pd.step,
        () => getNoiseBeh(currentCG)?.features[featureKey]?.params[pd.key] ?? pd.min,
        v  => {
          const beh = getNoiseBeh(currentCG);
          if (beh?.features[featureKey]) beh.features[featureKey].params[pd.key] = v;
        }
      ));
    }

    hd.addEventListener('click', () => {
      arrow.classList.toggle('open');
      paramsDiv.classList.toggle('hidden');
    });
  } else {
    hd.append(lbl);
  }

  wrap.appendChild(hd);
  wrap.appendChild(paramsDiv);

  cb.addEventListener('change', () => {
    // Auto-enable Noise if a feature is turned on while Noise is off
    if (cb.checked && !getNoiseBeh(currentCG)) {
      noiseActive = true;
      if (_noiseCb) _noiseCb.checked = true;
      if (currentCG) attachNoise(currentCG);
    }
    const beh = getNoiseBeh(currentCG);
    if (beh?.features[featureKey]) beh.features[featureKey].enabled = cb.checked;
  });

  function sync() {
    cb.checked = !!getNoiseBeh(currentCG)?.features[featureKey]?.enabled;
  }
  sync();

  wrap.sync = sync;
  return wrap;
}

function makeColorRow(label, getter, setter) {
  const row = document.createElement('div');
  row.className = 'color-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.value = getter();
  inp.addEventListener('input', () => {
    setter(inp.value);
    if (currentCG) syncCGtoP();
  });
  row.appendChild(lbl);
  row.appendChild(inp);
  return row;
}

function makeCheckColorRow(label, checkedGetter, checkedSetter, colorGetter, colorSetter) {
  const row = document.createElement('div');
  row.className = 'check-color-row';
  const id = 'ccr-' + label.toLowerCase().replace(/\s+/g, '-');
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.id = id; cb.checked = checkedGetter();
  cb.addEventListener('change', () => checkedSetter(cb.checked));
  const lbl = document.createElement('label');
  lbl.htmlFor = id; lbl.textContent = label;
  const picker = document.createElement('input');
  picker.type = 'color'; picker.value = colorGetter();
  picker.addEventListener('input', () => colorSetter(picker.value));

function makeSelectRow(label, options, getter, setter) {
  const row = document.createElement('div');
  row.className = 'sel-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const sel = document.createElement('select');
  options.forEach(opt => {
    const o = document.createElement('option');
    o.value = opt; o.textContent = opt;
    if (opt === getter()) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    setter(sel.value);
    ensureFont(sel.value);
    if (currentCG) syncCGtoP();
  });
  row.appendChild(lbl);
  row.appendChild(sel);
  return row;
}

function makeToggleRow(options, getter, setter) {
  const row = document.createElement('div');
  row.className = 'toggle-row';
  const btns = options.map(opt => {
    const btn = document.createElement('button');
    btn.className = 'tog-btn' + (opt.value === getter() ? ' active' : '');
    btn.textContent = opt.label;
    btn.addEventListener('click', () => {
      setter(opt.value);
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (opt.value === 'vector') ensureFont(P.font);
      if (currentCG) syncCGtoP();
    });
    row.appendChild(btn);
    return btn;
  });
  return row;
}

function makeSingleToggle(labelOn, labelOff, getter, setter) {
  const row = document.createElement('div');
  row.className = 'toggle-row';
  const btn = document.createElement('button');
  btn.className = 'tog-btn' + (getter() ? ' active' : '');
  btn.textContent = getter() ? labelOn : labelOff;
  btn.addEventListener('click', () => {
    const next = !getter();
    setter(next);
    btn.classList.toggle('active', next);
    btn.textContent = next ? labelOn : labelOff;
  });
  row.appendChild(btn);
  return row;
}

function makeActionBtn(label, fn) {
  const btn = document.createElement('button');
  btn.className = 'action-btn';
  btn.textContent = label;
  btn.addEventListener('click', fn);
  return btn;
}

// ── Char display ──────────────────────────────────────────────────────────────
function updateCharDisplay(char) {
  const el = document.getElementById('char-display');
  if (!char) {
    el.innerHTML = '<span style="color:#333">— press any key —</span>';
  } else {
    el.innerHTML = `<span class="char-big">${escapeHtml(char)}</span>` +
      `<span style="color:#555">U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')}</span>`;
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── PNG export ────────────────────────────────────────────────────────────────
async function printPNG() {
  const dpi = await showDpiDialog(300);
  if (!dpi) return;

  const scale  = dpi / 96;          // CSS pixels are 96 dpi
  const pw     = Math.round(_canvasW * scale);
  const ph     = Math.round(_canvasH * scale);

  const ec     = document.createElement('canvas');
  ec.width     = pw;
  ec.height    = ph;
  const ectx   = ec.getContext('2d');
  ectx.scale(scale, scale);

  ectx.fillStyle = P.bg;
  ectx.fillRect(0, 0, _canvasW, _canvasH);
  if (currentCG) drawCG(currentCG, ectx);

  ec.toBlob(blob => {
    const url  = URL.createObjectURL(blob);
    const name = currentCG
      ? `${currentCG.char}-${currentCG.font.replace(/\s+/g, '-')}-${dpi}dpi`
      : `abecedarium-${dpi}dpi`;
    const a = Object.assign(document.createElement('a'), { href: url, download: `${name}.png` });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    setSaveStatus('ok', `Exported: ${name}.png`);
  }, 'image/png');
}

function showDpiDialog(defaultDpi) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.id = 'save-modal-overlay';
    const modal = document.createElement('div');
    modal.id = 'save-modal';

    const label = document.createElement('label');
    label.textContent = 'Export resolution (DPI):';

    const input = document.createElement('input');
    input.type = 'number'; input.value = defaultDpi;
    input.min = '72'; input.max = '1200'; input.step = '1';
    input.style.cssText = 'width:100%;box-sizing:border-box;background:#0d0d0d;border:1px solid #333;color:#ddd;font-size:13px;padding:5px 8px;';
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') confirm();
      if (e.key === 'Escape') cancel();
      e.stopPropagation();
    });

    const btns = document.createElement('div');
    btns.className = 'modal-btns';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'cancel'; cancelBtn.textContent = 'Cancel';
    const exportBtn = document.createElement('button');
    exportBtn.textContent = 'Export';
    btns.append(cancelBtn, exportBtn);
    modal.append(label, input, btns);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    requestAnimationFrame(() => { input.select(); input.focus(); });

    function confirm() {
      const v = parseInt(input.value, 10);
      cleanup();
      resolve((v > 0 && v <= 1200) ? v : null);
    }
    function cancel() { cleanup(); resolve(null); }
    cancelBtn.addEventListener('click', cancel);
    exportBtn.addEventListener('click', confirm);
    overlay.addEventListener('click', e => { if (e.target === overlay) cancel(); });
    function cleanup() { document.body.removeChild(overlay); }
  });
}

// ── Save system ───────────────────────────────────────────────────────────────
// Save → JSON blob download (OS save dialog when browser "Ask where to save" is on).
// Load → <input type="file"> OS open dialog.

function _makeFileData(name) {
  return {
    name,
    char:      currentCG.char,
    timestamp: new Date().toISOString(),
    settings:  { ...P },
    behaviour: {
      danceActive,
      noiseActive,
      dance: (() => {
        const beh = getDanceBeh(currentCG);
        if (!beh) return null;
        const features = {};
        for (const key of Object.keys(beh.features))
          features[key] = { enabled: beh.features[key].enabled, params: { ...beh.features[key].params } };
        return { features };
      })(),
      noise: (() => {
        const beh = getNoiseBeh(currentCG);
        if (!beh) return null;
        const features = {};
        for (const key of Object.keys(beh.features))
          features[key] = { enabled: beh.features[key].enabled, params: { ...beh.features[key].params } };
        return { features };
      })(),
    },
    baseCmds: currentCG._baseCmds ? currentCG._baseCmds.map(c => ({ ...c })) : null,
  };
}

// ── Naming dialog (save) ──────────────────────────────────────────────────────
function showNamingDialog(defaultName) {
  return new Promise(resolve => {

      e.stopPropagation();
    });

    const btns = document.createElement('div');
    btns.className = 'modal-btns';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'cancel'; cancelBtn.textContent = 'Cancel';

    saveBtn.addEventListener('click', confirm);
    overlay.addEventListener('click', e => { if (e.target === overlay) cancel(); });
    function cleanup() { document.body.removeChild(overlay); }

// ── Video recording ───────────────────────────────────────────────────────────
function toggleRecording() {
  if (_mediaRecorder && _mediaRecorder.state !== 'inactive') {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  const canvas = document.getElementById('c');
  const fps    = 30;
  const mimeType = [
    'video/mp4;codecs=avc1', 'video/mp4',
    'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm',
  ].find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';

  _recChunks = [];
  const stream = canvas.captureStream(fps);
  _mediaRecorder = new MediaRecorder(stream, { mimeType });
  _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _recChunks.push(e.data); };
  _mediaRecorder.onstop = _onRecordingStopped;
  _mediaRecorder.start(100);

  _recStartTime   = Date.now();
  _recTimerHandle = setInterval(_updateRecTimer, 500);
  _updateRecBtn(true);
}

function _updateRecTimer() {
  const secs = Math.floor((Date.now() - _recStartTime) / 1000);
  const mm   = String(Math.floor(secs / 60)).padStart(2, '0');
  const ss   = String(secs % 60).padStart(2, '0');
  setSaveStatus('rec', `● ${mm}:${ss}`);
}

function stopRecording() {
  if (!_mediaRecorder || _mediaRecorder.state === 'inactive') return;
  clearInterval(_recTimerHandle);
  _mediaRecorder.stop();
}

function _onRecordingStopped() {
  _updateRecBtn(false);

  const mimeType = _mediaRecorder.mimeType;
  const ext      = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
  const blob     = new Blob(_recChunks, { type: mimeType });
  _recChunks     = [];

  const slug = currentCG
    ? `${currentCG.char}-${currentCG.font.replace(/\s+/g, '-')}`
    : 'abecedarium';
  const name = `${slug}-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}`;

  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), {
    href: url, download: `${name}.${ext}`,
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
  setSaveStatus('ok', `Video saved: ${name}.${ext}`);
}

function _updateRecBtn(recording) {
  if (!_recBtn) return;
  _recBtn.textContent   = recording ? 'Stop Record' : 'Record';
  _recBtn.style.color        = recording ? '#f77' : '';
  _recBtn.style.borderColor  = recording ? '#602020' : '';
}

// ── Save / Load ───────────────────────────────────────────────────────────────
async function saveStateToFile() {
  if (!currentCG) { setSaveStatus('err', 'No glyph — type a letter first'); return; }
  const name = `${currentCG.char}-${currentCG.font.replace(/\s+/g, '-')}`;

  try {
    const json = JSON.stringify(_makeFileData(name), null, 2);
    const blob = new Blob([json], { type: 'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: `${name}.abcd` });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    setSaveStatus('ok', `Saved: ${name}.abcd`);
  } catch (e) {
    setSaveStatus('err', `Save failed: ${e.message}`);
  }
}

function openStateFromFile() {
  const input = Object.assign(document.createElement('input'), { type: 'file', accept: '.abcd,.json' });
  input.addEventListener('change', async () => {
    if (!input.files[0]) return;
    try {
      loadStateFromData(JSON.parse(await input.files[0].text()));
      setSaveStatus('ok', `Loaded: ${input.files[0].name}`);
    } catch (e) {
      setSaveStatus('err', `Load failed: ${e.message}`);
    }
  });
  input.click();
}

function loadStateFromData(data) {
  Object.assign(P, data.settings);
  // Restore behaviour state
  if (data.behaviour) {
    danceActive = !!data.behaviour.danceActive;
    noiseActive = !!data.behaviour.noiseActive;
  }
  rebuildPanel();
  syncToolbar();
  spawnCG(data.char);
  // Restore dance features over whatever spawnCG attached
  if (data.behaviour && currentCG) {
    const beh = getDanceBeh(currentCG);
    if (beh) {
      if (data.behaviour.dance?.features) {
        // New format: restore feature objects directly
        Object.assign(beh.features, data.behaviour.dance.features);
      } else if (data.behaviour.danceParams) {
        // Legacy format: translate flat danceParams → feature model
        const dp = data.behaviour.danceParams;
        if (dp.spinAmt   != null) beh.features.spin.params.amt    = dp.spinAmt;
        if (dp.spinSpeed != null) beh.features.spin.params.speed  = dp.spinSpeed;
        if (dp.pulseAmt  != null) beh.features.pulse.params.amt   = dp.pulseAmt;
        if (dp.pulseSpeed!= null) beh.features.pulse.params.speed = dp.pulseSpeed;
        if (dp.driftAmt  != null) beh.features.drift.params.amt   = dp.driftAmt;
        if (dp.driftSpeed!= null) beh.features.drift.params.speed = dp.driftSpeed;
        if (dp.pinFeet != null) beh.features.pinFeet.enabled  = dp.pinFeet;
        if (dp.plantFeet   != null) beh.features.plantFeet.enabled    = dp.plantFeet;
        if (dp.pinFeetThresh != null) beh.features.plantFeet.params.thresh = dp.pinFeetThresh;
      }
      if (beh.features.plantFeet?.enabled)
        _recomputeBaselineAnchored(currentCG, currentCG.size * beh.features.plantFeet.params.thresh);
    }
    // Restore noise features (no legacy format — old files without noise key default to off)
    if (data.behaviour.noise?.features) {
      const nbeh = getNoiseBeh(currentCG);
      if (nbeh) {
        Object.assign(nbeh.features, data.behaviour.noise.features);
        _syncNoiseFeatureRows?.();
      }
    }
  }
  if (data.baseCmds && currentCG) {
    currentCG._baseCmds          = data.baseCmds.map(c => ({ ...c }));
    currentCG._displayCmds       = data.baseCmds.map(c => ({ ...c }));
    currentCG._noiseState        = null;
    currentCG._cachedPeriod      = -1;
    currentCG._baselineAnchored  = null;  // recomputed next time initCGPath runs
  }
}

// Rebuild everything below the title (used after loadState to reflect new P values)
function rebuildPanel() {
  const panel = document.getElementById('panel');
  while (panel.children.length > 1) panel.removeChild(panel.lastChild);
  buildUI();
}

// ── Alphabet auto-run logic ───────────────────────────────────────────────────
function startAutoRun() {
  _autoRunning = true;
  _autoIndex   = 0;
  // Snapshot current dance features so every letter gets the same settings.
  // Falls back to DANCE_DEFAULT if no glyph is present.
  const src = getDanceBeh(currentCG)?.features ?? DANCE_DEFAULT;
  _autoFeatures = {};
  for (const key of Object.keys(src))
    _autoFeatures[key] = { enabled: src[key].enabled, params: { ...src[key].params } };
  _autoStep();
  _updateAutoBtn();
}

function stopAutoRun() {
  _autoRunning = false;
  clearTimeout(_autoTimer);
  _autoTimer = null;
  _updateAutoBtn();
}

function _autoStep() {
  if (!_autoRunning) return;
  if (_autoIndex >= AUTO_ALPHABET.length) _autoIndex = 0;  // loop

  const prevX        = currentCG ? currentCG.homeX : null;
  const prevY        = currentCG ? currentCG.homeY : null;
  const savedDrag    = bodyDrag;   // preserve mid-drag across glyph switch

  const base = AUTO_ALPHABET[_autoIndex];
  const char = _autoUppercase ? base : base.toLowerCase();
  danceActive = true;
  if (_danceCb)  _danceCb.checked  = true;
  if (_noiseCb)  _noiseCb.checked  = noiseActive;
  spawnCG(char);   // clears bodyDrag — we restore it below
  // Override per-letter dance config with the snapshot taken at run start
  if (_autoFeatures && getDanceBeh(currentCG)) {
    const f = getDanceBeh(currentCG).features;
    for (const key of Object.keys(_autoFeatures))
      f[key] = { enabled: _autoFeatures[key].enabled, params: { ..._autoFeatures[key].params } };
    if (f.plantFeet?.enabled)
      _recomputeBaselineAnchored(currentCG, currentCG.size * f.plantFeet.params.thresh);
  }

  if (prevX !== null) {
    currentCG.x = currentCG.homeX = prevX;
    currentCG.y = currentCG.homeY = prevY;
  }
  if (savedDrag) bodyDrag = savedDrag;  // hand the active drag to the new glyph

  setSaveStatus('ok', `${char}  (${_autoIndex + 1} / ${AUTO_ALPHABET.length})`);
  _autoTimer = setTimeout(() => {
    _autoIndex++;
    _autoStep();
  }, _autoDwell * 1000);
}

function _updateAutoBtn() {
  if (!_autoRunBtn) return;
  _autoRunBtn.textContent  = _autoRunning ? 'Stop abcde…' : 'abcde…';
  _autoRunBtn.style.color       = _autoRunning ? '#f77' : '';
  _autoRunBtn.style.borderColor = _autoRunning ? '#602020' : '';
}
